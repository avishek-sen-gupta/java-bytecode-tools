repos:
  # Python formatting
  - repo: local
    hooks:
      - id: black
        name: black
        entry: bash -c 'cd python && uv run black "${@#python/}"' --
        language: system
        files: ^python/.*\.py$
        types: [python]

  # Java formatting (google-java-format)
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.14.0
    hooks:
      - id: pretty-format-java
        args: [--autofix, --google-java-formatter-version=1.25.2]
        files: ^java/src/

  # Secret detection
  - repo: local
    hooks:
      - id: talisman
        name: talisman
        entry: bash -c '"$HOME/.talisman/bin/talisman_darwin_amd64" --githook pre-commit'
        language: system
        pass_filenames: false
        types: [file]
        stages: [pre-commit]

  # Python type checking (production code only)
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: bash -c 'cd python && uv run --with pyright pyright .'
        language: system
        files: ^python/.*\.py$
        exclude: ^python/tests/
        pass_filenames: false
        types: [python]

  # Python dependency vulnerability scanning
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: bash -c 'cd python && uv run --with pip-audit pip-audit'
        language: system
        files: ^python/(pyproject\.toml|uv\.lock)$
        pass_filenames: false

  # Tests
  - repo: local
    hooks:
      - id: all-tests
        name: all tests
        entry: bash run-all-tests.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
